[target.x86_64-unknown-none]
rustflags = ["-C", "force-frame-pointers=yes"]

[target.x86_64-unknown-uefi]
rustflags = ["-C", "force-frame-pointers=yes"]

[source.crates-io]
replace-with = 'tuna'

[source.tuna]
# 使用最新的稀疏索引协议，速度极快
registry = "sparse+https://mirrors.tuna.tsinghua.edu.cn/crates.io-index/"

[net]
git-fetch-with-cli = true
